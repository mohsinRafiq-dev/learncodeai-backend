version: '3.8'

services:
  learncode-ai-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      # Remove Docker socket binding for security
      - ./temp:/app/temp:rw
      - ./logs:/app/logs:rw
    environment:
      - NODE_ENV=production
    # Remove privileged mode
    # privileged: false (default)
    
    # Security enhancements
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # User namespace mapping
    user: "1000:1000"
    
    # Read-only root filesystem where possible
    read_only: false  # Set to true if app doesn't need write access to root
    
    # Capabilities - drop all unnecessary capabilities
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    
    # Restart policy
    restart: unless-stopped
    
    depends_on:
      - python-executor
      - javascript-executor
      - cpp-executor
    
    networks:
      - learncode-ai-network

  python-executor:
    build:
      context: ./docker
      dockerfile: Dockerfile.python.persistent.secure
    ports:
      - "8765:8765"
    
    # Security configurations
    security_opt:
      - no-new-privileges:true
    
    # Resource limits for code execution container
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    cap_drop:
      - ALL
    
    read_only: true
    
    # Temporary filesystem for execution
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    restart: unless-stopped
    networks:
      - learncode-ai-network

  javascript-executor:
    build:
      context: ./docker
      dockerfile: Dockerfile.javascript.persistent.secure
    ports:
      - "8766:8765"
    
    security_opt:
      - no-new-privileges:true
    
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    cap_drop:
      - ALL
    
    read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    restart: unless-stopped
    networks:
      - learncode-ai-network

  cpp-executor:
    build:
      context: ./docker
      dockerfile: Dockerfile.cpp.persistent.secure
    ports:
      - "8767:8765"
    
    security_opt:
      - no-new-privileges:true
    
    deploy:
      resources:
        limits:
          memory: 512M  # C++ might need more for compilation
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    
    cap_drop:
      - ALL
    
    read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    restart: unless-stopped
    networks:
      - learncode-ai-network

networks:
  learncode-ai-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"  # Disable inter-container communication
    internal: false  # Set to true if no external network access needed
